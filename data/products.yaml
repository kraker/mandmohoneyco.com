categories:
  - name: "Honey"
    description: "100% raw & unfiltered, straight from our hives"
    items:
      - name: "Raw Unfiltered Honey"
        description: "Pure, raw, and unfiltered honey from our hives in Tulsa."
        sizes:
          - label: "1 lb (16 oz)"
            price: 15
          - label: "8 oz"
            price: 8
      - name: "Creamed Honey"
        description: >-
          Not dairy! Creamed honey is 100% raw honey with carefully controlled
          crystallization, producing a smooth, spreadable texture like soft
          butter. Spoon it onto toast, biscuits, or fruit.
        sizes:
          - label: "4 oz"
            price: 6
          - label: "1/2 lb (8 oz)"
            price: 12
          - label: "1 lb (16 oz)"
            price: 24
        flavors:
          - name: "Plain"
            description: "Pure creamed honey with no additional flavors."
          - name: "Lemon"
            description: "Organic freeze-dried lemon powder."
          - name: "Chai"
            description: >-
              Traditional Masala Chai: black tea, cinnamon, cardamom,
              ginger, nutmeg, cloves.
          - name: "Hot"
            description: "Organic ancho habanero added for a spicy kick."
          - name: "Pumpkin Spice"
            description: "Clove, cinnamon, ginger, nutmeg, allspice, and mace."

  - name: "Beeswax Candles"
    description: "Hand-poured 100% beeswax candles"
    items:
      - name: "Jar Candle"
        description: "100% beeswax candles, hand-poured into amber glass jars."
        sizes:
          - label: "7.5 oz"
            price: 20
        scents:
          - name: "Unscented"
            description: "No essential oils added."
          - name: "Lavender"
            description: "Organic lavender essential oil to help relax the day away."
          - name: "Comfortable Zen"
            description: >-
              Organic ylang ylang, sweet orange, and patchouli essential
              oils. A light and pleasant scent.
          - name: "Woodsy"
            description: >-
              Cedarwood, cypress, myrrh, and fir essential oils. A breath
              of fresh air.
          - name: "Fresh and Bright"
            description: >-
              Organic lavender, rosemary, and frankincense essential oils.
              Bright and energetic.
      - name: "Votive Candle"
        description: "Small hand-poured 100% beeswax votive candles."
        sizes:
          - label: ""
            price: 4
      - name: "Taper Candles"
        description: "Hand-dipped 100% beeswax taper candles, sold as a pair."
        sizes:
          - label: "pair"
            price: 10

  - name: "Body Care"
    description: "Beeswax-based skin care, handcrafted with natural ingredients"
    items:
      - name: "Hand Salve"
        description: >-
          A blend of beeswax and organic cold-pressed jojoba and argan oils.
          Gentle enough for faces, strong enough for rough hands.
        sizes:
          - label: "2 oz"
            price: 15
        scents:
          - name: "Unscented"
            description: "No essential oils added."
          - name: "Dreamy"
            description: "Organic ylang ylang and sandalwood essential oils."
          - name: "Woodsy"
            description: >-
              Organic cedarwood, cypress, and fir essential oils. A breath
              of fresh air.
      - name: "Lotion"
        description: >-
          Rich beeswax lotion with shea, argan, jojoba, apricot, and castor
          oils, rose water, aloe, chamomile, and elderberry.
        sizes:
          - label: "3 oz"
            price: 20
      - name: "Beard Balm"
        description: >-
          A blend of beeswax and organic cold-pressed jojoba, apricot
          kernel, castor, and argan oils. Moisturizes even the most rugged
          of faces and facial hair.
        sizes:
          - label: "2 oz tin"
            price: 12
      - name: "Beard Oil"
        description: "Organic cold-pressed oil blend, finished with vitamin E."
        sizes:
          - label: "1 oz (30 ml)"
