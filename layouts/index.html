{{ define "main" }}
<section class="hero">
  <div class="container">
    <p class="hero-tagline-top">Created by critters, Crafted by hand.</p>
    <h1 class="hero-title">M. &amp; Mo.<br>Honey Co.</h1>
    <img src="/images/beehives.png" alt="Three stylized beehives" class="hero-beehives">
    <p class="hero-location">Tulsa, OK 74126</p>
    <a href="/products/" class="btn">View Our Products</a>
  </div>
</section>

<section class="intro">
  <div class="container">
    {{ .Content }}
  </div>
</section>

<section class="featured-products">
  <div class="container">
    <h2>What We Offer</h2>
    <div class="category-grid">
      {{ range .Site.Data.products.categories }}
      <div class="category-card">
        <h3>{{ .name }}</h3>
        <p>{{ .description }}</p>
      </div>
      {{ end }}
    </div>
    <p class="text-center"><a href="/products/" class="btn btn-outline">See All Products &amp; Pricing</a></p>
  </div>
</section>
{{ end }}
