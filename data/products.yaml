  - name: "Home"
    description: "Beeswax products for around the house"
    items:
      - name: "Cutting Board Butter"
        description: >-
          A blend of beeswax and mineral oil to extend the lifetime of wood
          and bamboo cutting boards and utensils.
        sizes:
          - label: "2 oz"
            price: 5
